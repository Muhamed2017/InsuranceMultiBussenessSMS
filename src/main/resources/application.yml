spring:
  application:
    name: MIC-Multi-Business-SMS-Middleware
    sql:
      init:
        mode: always # or 'embedded' / 'never' depending on your need
        platform: sqlserver
        continue-on-error: false
        separator: ";"

  datasource:
    url: jdbc:sqlserver://10.65.183.210:1433;databaseName=MIC_SMS;encrypt=true;trustServerCertificate=true
    username: m.jomaa
    password: misr@2020
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: false

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

logging:
  level:
    com.mic.smsmiddleware: INFO
    org.springframework.jdbc.core: WARN
    org.springframework.web.client: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %-40logger{40} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %-40logger{40} - %msg%n"
  file:
    name: logs/sms-middleware.log
    max-size: 50MB
    max-history: 30

